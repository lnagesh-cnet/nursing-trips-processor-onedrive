services:
  - type: web
    name: nursing-trips-processor-onedrive
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    healthCheckPath: /
    envVars:
      - key: MS_TENANT_ID
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_USER_EMAIL
        value: lnagesh@comprehensivenet.com
      - key: ONEDRIVE_USER_EMAIL
        value: lnagesh@comprehensivenet.com
      - key: ONEDRIVE_FOLDER_PATH
        value: Nursing Trip PDFs
      - key: PORT
        value: "10000"
