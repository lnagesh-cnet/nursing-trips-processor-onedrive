services:
  - type: web
    name: nursing-trips-processor-onedrive
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    healthCheckPath: /
    envVars:
      # Microsoft Graph (email attachment fetch)
      - key: MS_TENANT_ID
        sync: false
      - key: MS_CLIENT_ID
        sync: false
      - key: MS_CLIENT_SECRET
        sync: false
      - key: MS_USER_EMAIL
        value: lnagesh@comprehensivenet.com
      # SharePoint (PDF storage + Excel backup)
      - key: SP_SITE_ID
        sync: false
      - key: SP_DRIVE_ID
        sync: false
      - key: SP_WORKBOOK_ID
        sync: false
      - key: SP_TABLE_NAME
        value: TripDetails
      - key: SP_PDF_BASE_PATH
        value: Nursing Trips/PDFs
      - key: PORT
        value: "10000"
